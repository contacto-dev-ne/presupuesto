name: accion_magica

on:
  schedule:
    # Se ejecuta a las 21:00 UTC (17:00 hrs de Chile continental en invierno)
    # Todos los días entre el 16 y el 25 de cada mes
    - cron: '0 21 16-25 * *'
  workflow_dispatch: # Activa el botón manual para forzar la ejecución hoy mismo

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar entorno Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        pip install pandas openpyxl requests

    - name: Descargar y Procesar Datos (Acción Mágica)
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        GOOGLE_DRIVE_FILE_ID: ${{ secrets.GOOGLE_DRIVE_FILE_ID }}
      run: python export_to_json.py

    - name: Subir cambios al repositorio automáticamente
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "Automatización CChC"
        git add datos_ejecucion.json
        git commit -m "accion_magica: Base Dirplan MOP actualizada [skip ci]" || exit 0
        git push
